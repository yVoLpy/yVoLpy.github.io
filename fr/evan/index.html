<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Une question pour toi...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0;
       -webkit-user-select: none; user-select: none;
       -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  #question {
    position: fixed;
    top: 14%;
    left: 50%;
    transform: translateX(-50%);
    width: 92%;
    text-align: center;
    font-size: clamp(1.3rem, 6vw, 2.4rem);
    font-weight: bold;
    line-height: 1.3;
  }
  .btn {
    position: fixed;
    padding: 20px 0;
    width: 38vw;
    max-width: 200px;
    text-align: center;
    font-size: clamp(1.1rem, 5vw, 1.5rem);
    font-weight: bold;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    touch-action: manipulation;
  }
  #yes {
    background: #1db954;
    color: #fff;
    top: 55%;
    left: 28%;
    transform: translate(-50%, -50%);
  }
  #no {
    background: #e0245e;
    color: #fff;
    top: 55%;
    left: 72%;
    transform: translate(-50%, -50%);
    transition: top 0.12s ease, left 0.12s ease;
  }
  #result {
    display: none;
    position: fixed;
    inset: 0;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: clamp(3rem, 18vw, 8rem);
    font-weight: 900;
    letter-spacing: 4px;
    color: #ff2d95;
    text-shadow: 0 0 25px #ff2d95;
    padding: 5vw;
    word-break: break-word;
  }
</style>
</head>
<body>
  <div id="question">Est-ce que tu aimes sucer la bite d'Evan ?</div>

  <button id="yes" class="btn">OUI</button>
  <button id="no" class="btn">NON</button>

  <div id="result">SUPERGAY</div>

  <script>
    const no = document.getElementById('no');
    const yes = document.getElementById('yes');
    const question = document.getElementById('question');
    const result = document.getElementById('result');

    let started = false; // depois do 1º movimento, usa coords absolutas

    function moveNo(e) {
      if (e) { e.preventDefault(); }
      const pad = 16;
      const w = no.offsetWidth;
      const h = no.offsetHeight;
      const maxX = Math.max(pad, window.innerWidth  - w - pad);
      const maxY = Math.max(pad, window.innerHeight - h - pad);
      const x = pad + Math.random() * (maxX - pad);
      const y = pad + Math.random() * (maxY - pad);
      no.style.transform = 'none';
      no.style.left = x + 'px';
      no.style.top  = y + 'px';
      started = true;
    }

    // Mobile: foge no primeiro toque, antes do "clique" acontecer
    no.addEventListener('touchstart', moveNo, { passive: false });
    no.addEventListener('pointerdown', moveNo);
    // Desktop: foge ao passar o mouse e ao clicar
    no.addEventListener('mouseenter', moveNo);
    no.addEventListener('click', moveNo);

    function reveal() {
      question.style.display = 'none';
      yes.style.display = 'none';
      no.style.display = 'none';
      result.style.display = 'flex';
    }
    yes.addEventListener('click', reveal);

    // se a tela girar/redimensionar e o botão tiver fugido, mantém ele dentro
    window.addEventListener('resize', function () {
      if (started) { moveNo(); }
    });
  </script>
</body>
</html>
